version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - DB_HOST=10.0.0.8
      - DB_USER=root
      - DB_PASS=root123
      - DB_NAME=simple_spark
      - JWT_SECRET=your-secret-key
      - ALLOWED_ORIGIN=http://localhost:3000
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    stdin_open: true
    tty: true
    restart: always