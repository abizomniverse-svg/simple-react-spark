worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    access_log  E:/simple-react-spark-main/Deployment/achme/logs/nginx-access.log;
    error_log   E:/simple-react-spark-main/Deployment/achme/logs/nginx-error.log warn;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens off;

    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # 1. HTTP: Redirect all to HTTPS
    server {
        listen       80 default_server;
        listen       [::]:80 default_server;
        server_name  _;
        return 301 https://$host$request_uri;
    }

    # 2. HTTPS: Main server - API works on IP, pages redirect IP to achme.com
    server {
        listen       443 ssl default_server;
        listen       [::]:443 ssl default_server;
        server_name  achme.com 192.168.0.122 localhost;

        ssl_certificate      E:/simple-react-spark-main/Deployment/achme/ssl/achme.crt;
        ssl_certificate_key  E:/simple-react-spark-main/Deployment/achme/ssl/achme.key;

        # Proxy all /api requests to Express backend (works for both IP and domain)
        location /api/ {
            proxy_pass http://127.0.0.1:5000/api/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # CORS
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With' always;

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With';
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }
        }

        # Socket.io proxy
        location /socket.io/ {
            proxy_pass http://127.0.0.1:5000/socket.io/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # Static uploads
        location /uploads/ {
            proxy_pass http://127.0.0.1:5000/uploads/;
        }

        # Static React SPA + IP redirect for non-API requests
        location / {
            # Redirect IP access to achme.com domain
            if ($host = '192.168.0.122') {
                return 301 https://achme.com$request_uri;
            }
            if ($host = 'localhost') {
                return 301 https://achme.com$request_uri;
            }
            if ($host = '127.0.0.1') {
                return 301 https://achme.com$request_uri;
            }

            root   E:/simple-react-spark-main/Deployment/achme/frontend;
            index  index.html;
            try_files $uri $uri/ /index.html;
        }

        client_max_body_size 50M;

        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
